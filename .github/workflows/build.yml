name: Cloud HelixOS Production Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential curl flex g++-multilib gcc-multilib git \
            gnupg gperf libxml2-utils lzop rsync unzip zip \
            openjdk-11-jdk python3 python-is-python3

      - name: Install Repo Tool
        run: |
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Git Identity
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Init Android 11 Source
        run: |
          mkdir -p workspace
          cd workspace
          repo init -u https://android.googlesource.com/platform/manifest -b android-11.0.0_r48

      - name: Sync Android Source
        run: |
          cd workspace
          repo sync -c --no-tags --no-clone-bundle -j2

      - name: Show Available Build Products
        run: |
          cd workspace
          source build/envsetup.sh
          find device -name AndroidProducts.mk
          lunch || true

      - name: Inject HelixOS Branding
        run: |
          cd workspace
          mkdir -p vendor/helixos
          echo "HelixOS Android 11 x86_64" > vendor/helixos/HELIXOS.txt

      - name: Build HelixOS system.img
        run: |
          cd workspace
          source build/envsetup.sh
          lunch sdk_phone_x86_64-userdebug
          m systemimage -j2

      - name: Prepare Output
        if: always()
        run: |
          mkdir -p output
          find workspace/out -name "system.img" -exec cp {} output/HelixOS-system.img \; || true
          ls -lh output || true

      - name: Upload GitHub Actions Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: HelixOS-system-img
          path: output/

      - name: Push Build Files To Repo
        if: success()
        run: |
          git add output || true
          git commit -m "Add HelixOS build output" || echo "Nothing to commit"
          git push origin main
